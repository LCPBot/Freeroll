<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Freeroll Calc</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f13; --surface: #1a1a24; --surface2: #22222e; --border: #2e2e3e;
    --accent: #00e5a0; --accent-dim: rgba(0,229,160,0.12);
    --red: #ff4d6d; --red-dim: rgba(255,77,109,0.12);
    --yellow: #ffd166; --yellow-dim: rgba(255,209,102,0.10);
    --blue: #60a5fa; --blue-dim: rgba(96,165,250,0.12);
    --text: #e8e8f0; --muted: #6b6b80; --radius: 10px;
    --font: 'Inter', system-ui, sans-serif;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 2rem 1rem; }
  .container { width: 100%; max-width: 540px; }
  .header { margin-bottom: 1.5rem; }
  .header h1 { font-size: 13px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); }
  .header p { font-size: 12px; color: var(--muted); margin-top: 3px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; margin-bottom: 1rem; }
  .card-title { font-size: 11px; font-weight: 600; letter-spacing: 0.10em; text-transform: uppercase; color: var(--muted); margin-bottom: 1rem; }
  .field { margin-bottom: 0.75rem; }
  .field label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 5px; font-weight: 500; letter-spacing: 0.04em; }
  .field input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 7px; padding: 10px 12px; font-size: 16px; color: var(--text); font-family: var(--font); transition: border-color 0.15s; }
  .field input:focus { outline: none; border-color: var(--accent); }
  .field input::placeholder { color: var(--muted); font-size: 14px; }
  .divider { border: none; border-top: 1px solid var(--border); margin: 1rem 0; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .stake-wrap { position: relative; }
  .stake-wrap input { padding-left: 36px; }
  .stake-wrap .prefix { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 13px; color: var(--muted); pointer-events: none; margin-top: 10px; }

  /* cenario badge */
  .cenario-box { border-radius: 8px; padding: 10px 14px; margin-top: 0.75rem; display: flex; align-items: center; gap: 10px; }
  .cenario-box.c1 { background: var(--accent-dim); border: 1px solid var(--accent); }
  .cenario-box.c3 { background: var(--blue-dim); border: 1px solid var(--blue); }
  .cenario-box.neutro { background: var(--surface2); border: 1px solid var(--border); }
  .cenario-icon { font-size: 20px; }
  .cenario-label { font-size: 12px; font-weight: 600; }
  .cenario-desc { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .cenario-box.c1 .cenario-label { color: var(--accent); }
  .cenario-box.c3 .cenario-label { color: var(--blue); }

  .stakes-result { background: var(--surface2); border-radius: 8px; padding: 12px 14px; margin-top: 0.75rem; }
  .stakes-result .sr-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .stakes-result .sr-row:last-child { margin-bottom: 0; }
  .stakes-result .sr-label { font-size: 12px; color: var(--muted); }
  .stakes-result .sr-val { font-size: 15px; font-weight: 600; color: var(--text); }

  .results { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
  .result-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem; }
  .result-label { font-size: 10px; color: var(--muted); font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 6px; }
  .result-val { font-size: 19px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .result-sub { font-size: 10px; color: var(--muted); margin-top: 3px; }
  .val-pos { color: var(--accent); } .val-neg { color: var(--red); } .val-zero { color: var(--yellow); } .val-muted { color: var(--muted); }
  .result-card.double { border-color: var(--accent); background: var(--accent-dim); }
  .result-card.double .result-label { color: var(--accent); }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <h1>Freeroll Calc</h1>
    <p>Detecta automaticamente o melhor cenário por aposta</p>
  </div>

  <div class="card">
    <div class="card-title">Dados do mercado</div>

    <div class="row2">
      <div class="field"><label>Jogador</label><input id="jogador" type="text" placeholder="ex: Dani Olmo"></div>
      <div class="field"><label>Linha</label><input id="linha" type="number" min="0.5" step="0.5" placeholder="ex: 1.5"></div>
    </div>

    <div class="divider"></div>

    <div class="row2">
      <div class="field"><label>Odd under — Bet365</label><input id="odd_under" type="number" min="1.01" step="0.01" placeholder="ex: 1.83"></div>
      <div class="field"><label>Casa over</label><input id="casa" type="text" placeholder="ex: Betano"></div>
    </div>
    <div class="field"><label>Odd over</label><input id="odd_over" type="number" min="1.01" step="0.01" placeholder="ex: 2.05"></div>

    <div class="divider"></div>

    <div class="row2">
      <div class="stake-wrap field">
        <label>Stake over (R$)</label>
        <span class="prefix">R$</span>
        <input id="inp_over" type="number" min="1" step="1" placeholder="digita o over...">
      </div>
      <div class="stake-wrap field">
        <label>Stake under (R$)</label>
        <span class="prefix">R$</span>
        <input id="inp_under" type="number" min="1" step="1" placeholder="...ou o under">
      </div>
    </div>

    <!-- Cenário detectado -->
    <div id="cenario_box" class="cenario-box neutro" style="display:none;">
      <div class="cenario-icon" id="cenario_icon">—</div>
      <div>
        <div class="cenario-label" id="cenario_label">—</div>
        <div class="cenario-desc" id="cenario_desc">—</div>
      </div>
    </div>

    <!-- Stakes recomendados -->
    <div class="stakes-result" id="stakes_result" style="display:none;">
      <div class="sr-row">
        <span class="sr-label">✅ Stake over recomendado</span>
        <span class="sr-val" id="sr_over">—</span>
      </div>
      <div class="sr-row">
        <span class="sr-label">✅ Stake under recomendado</span>
        <span class="sr-val" id="sr_under">—</span>
      </div>
      <div class="sr-row">
        <span class="sr-label">Threshold (odd_under ÷ (odd_under-1))</span>
        <span class="sr-val" id="sr_threshold" style="color:var(--muted);font-size:13px;">—</span>
      </div>
    </div>
  </div>

  <div class="results">
    <div class="result-card">
      <div class="result-label">Green</div>
      <div class="result-val val-muted" id="pl_green">—</div>
      <div class="result-sub">linha bate, sem sub</div>
    </div>
    <div class="result-card">
      <div class="result-label">Red</div>
      <div class="result-val val-muted" id="pl_red">—</div>
      <div class="result-sub">sub, não fecha</div>
    </div>
    <div class="result-card double">
      <div class="result-label">Double Green</div>
      <div class="result-val val-muted" id="pl_double">—</div>
      <div class="result-sub">sub + fecha</div>
    </div>
  </div>

</div>
<script>
let lastEdited = null, updating = false;

function fmt(n) { if (isNaN(n)) return '—'; return (n >= 0 ? '+R$ ' : '-R$ ') + Math.abs(n).toFixed(2); }
function fmtR(n) { return 'R$ ' + Math.abs(n).toFixed(0); }

function recalc() {
  if (updating) return;
  updating = true;

  const oo = parseFloat(document.getElementById('odd_over').value);
  const ou = parseFloat(document.getElementById('odd_under').value);
  const so_raw = parseFloat(document.getElementById('inp_over').value);
  const su_raw = parseFloat(document.getElementById('inp_under').value);

  // Determinar melhor cenário
  let cenario = null;
  let su_rec = null, so_rec = null;

  if (oo > 1 && ou > 1) {
    const threshold = ou / (ou - 1);
    if (oo > threshold) {
      cenario = 'C3'; // GREEN=0: su = so*(oo-1)
    } else if (oo < threshold) {
      cenario = 'C1'; // RED=0: su = so/(ou-1)
    } else {
      cenario = 'neutro';
    }

    // Calcular stakes recomendados
    if (lastEdited === 'over' && so_raw > 0) {
      so_rec = so_raw;
      if (cenario === 'C3') su_rec = so_raw * (oo - 1);
      else if (cenario === 'C1') su_rec = so_raw / (ou - 1);
      else su_rec = so_raw / (ou - 1);
      document.getElementById('inp_under').value = Math.round(su_rec);
    } else if (lastEdited === 'under' && su_raw > 0) {
      su_rec = su_raw;
      if (cenario === 'C3') so_rec = su_raw / (oo - 1);
      else if (cenario === 'C1') so_rec = su_raw * (ou - 1);
      else so_rec = su_raw * (ou - 1);
      document.getElementById('inp_over').value = Math.round(so_rec);
    }
  }

  updating = false;

  const so = parseFloat(document.getElementById('inp_over').value);
  const su = parseFloat(document.getElementById('inp_under').value);

  // Mostrar cenário detectado
  const cbox = document.getElementById('cenario_box');
  const clabel = document.getElementById('cenario_label');
  const cdesc = document.getElementById('cenario_desc');
  const cicon = document.getElementById('cenario_icon');
  const sres = document.getElementById('stakes_result');

  if (oo > 1 && ou > 1) {
    const threshold = ou / (ou - 1);
    cbox.style.display = 'flex';
    sres.style.display = 'block';
    document.getElementById('sr_threshold').textContent = threshold.toFixed(2);

    if (cenario === 'C3') {
      cbox.className = 'cenario-box c3';
      cicon.textContent = '🔵';
      clabel.textContent = 'Cenário C3 — GREEN=0 (melhor para essa aposta)';
      cdesc.textContent = `Odd over (${oo.toFixed(2)}) > threshold (${threshold.toFixed(2)}) → mais under, prejuízo vai pro RED`;
    } else if (cenario === 'C1') {
      cbox.className = 'cenario-box c1';
      cicon.textContent = '🟢';
      clabel.textContent = 'Cenário C1 — RED=0 (melhor para essa aposta)';
      cdesc.textContent = `Odd over (${oo.toFixed(2)}) < threshold (${threshold.toFixed(2)}) → freeroll clássico, RED fica zero`;
    } else {
      cbox.className = 'cenario-box neutro';
      cicon.textContent = '⚪';
      clabel.textContent = 'Indiferente — odds no ponto exato do threshold';
      cdesc.textContent = 'Qualquer cenário dá o mesmo resultado';
    }

    if (so > 0 && su > 0) {
      document.getElementById('sr_over').textContent = fmtR(so);
      document.getElementById('sr_under').textContent = fmtR(su);
    }
  } else {
    cbox.style.display = 'none';
    sres.style.display = 'none';
  }

  // P&L
  if (!oo || oo <= 1 || !ou || ou <= 1 || !so || !su) {
    ['pl_green','pl_red','pl_double'].forEach(id => {
      document.getElementById(id).textContent = '—';
      document.getElementById(id).className = 'result-val val-muted';
    });
    return;
  }

  const pl_green  = so*(oo-1) - su;
  const pl_red    = -so + su*(ou-1);
  const pl_double = so*(oo-1) + su*(ou-1);

  const g = document.getElementById('pl_green');
  g.textContent = fmt(pl_green);
  g.className = 'result-val ' + (Math.abs(pl_green) < 1 ? 'val-zero' : pl_green > 0 ? 'val-pos' : 'val-neg');

  const r = document.getElementById('pl_red');
  r.textContent = fmt(pl_red);
  r.className = 'result-val ' + (Math.abs(pl_red) < 1 ? 'val-zero' : pl_red > 0 ? 'val-pos' : 'val-neg');

  const d = document.getElementById('pl_double');
  d.textContent = fmt(pl_double);
  d.className = 'result-val val-pos';
}

document.getElementById('inp_over').addEventListener('input',  () => { lastEdited = 'over';  recalc(); });
document.getElementById('inp_under').addEventListener('input', () => { lastEdited = 'under'; recalc(); });
document.getElementById('odd_over').addEventListener('input',  recalc);
document.getElementById('odd_under').addEventListener('input', recalc);
</script>
</body>
</html>
